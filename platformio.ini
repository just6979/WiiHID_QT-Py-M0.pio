; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
build_cache_dir = .pio/build_cache
default_envs = release

[env]
platform = atmelsam
board = adafruit_qt_py_m0
framework = arduino
build_flags =
	-DUSE_TINYUSB

[env:release]
build_flags = ${env.build_flags} -DRELEASE
lib_deps =
	adafruit/Adafruit NeoPixel@^1.15.4
	madhephaestus/WiiChuck@^0.4.1
	adafruit/Adafruit IS31FL3741 Library@^1.2.3
	adafruit/Adafruit Debounce@^1.0.0
	adafruit/Adafruit LED Backpack Library@^1.5.1

[env:debug]
build_type = debug
build_flags = ${env.build_flags} -DDEBUG
lib_deps =
	adafruit/Adafruit NeoPixel@^1.15.4
	madhephaestus/WiiChuck@^0.4.1
	adafruit/Adafruit IS31FL3741 Library@^1.2.3
	adafruit/Adafruit Debounce@^1.0.0
	adafruit/Adafruit LED Backpack Library@^1.5.1
